      - scope
      - scopeTag
      - group
      - gender
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          example: INTERNAL_ERROR
        message:
          type: string
          example: An unexpected server error occurred
        details:
          type: object
          additionalProperties: true
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- bearerAuth: []
