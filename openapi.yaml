components:
  schemas:
    LoginRequest:
      type: object
      properties:
        LoginRequest:
          type: string
        username:
          type: string
        password:
          type: string
        getUsername:
          type: string
        setUsername:
          type: string
        getPassword:
          type: string
        setPassword:
          type: string
      required:
      - LoginRequest
      - username
      - password
      - getUsername
      - setUsername
      - getPassword
      - setPassword
    RegisterRequest:
      type: object
      properties:
        RegisterRequest:
