        username:
          type: string
        email:
          type: string
        password:
          type: string
        getUsername:
          type: string
        setUsername:
          type: string
        getEmail:
          type: string
        setEmail:
          type: string
        getPassword:
          type: string
        setPassword:
          type: string
      required:
      - RegisterRequest
      - username
      - email
      - password
      - getUsername
      - setUsername
      - getEmail
      - setEmail
      - getPassword
      - setPassword
    ClubDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
      - id
      - name
    ClubMemberDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clubId:
          type: string
          format: uuid
        practicionerId:
          type: string
          format: uuid
      required:
      - id
      - clubId
      - practicionerId
    EnrichedClubMemberDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        club:
          $ref: '#/components/schemas/ClubDto'
        practicioner:
          $ref: '#/components/schemas/PracticionerDto'
      required:
      - id
      - club
      - practicioner
    LoginResponse:
      type: object
      properties:
        LoginResponse:
          type: string
        token:
          type: string
        type:
          type: string
        username:
          type: string
        getToken:
          type: string
        setToken:
          type: string
        getType:
          type: string
        setType:
          type: string
        getUsername:
          type: string
        setUsername:
          type: string
        toString:
          type: string
      required:
      - LoginResponse
      - token
      - type
      - username
      - getToken
      - setToken
      - getType
      - setType
      - getUsername
      - setUsername
      - toString
    ErrorResponseDto:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
    EnrichedMatchDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        playerLocalResultDto:
          $ref: '#/components/schemas/MatchSeasonPlayerResultDto'
