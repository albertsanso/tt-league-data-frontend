        season:
          type: string
        competitionInfo:
          $ref: '#/components/schemas/CompetitionInfoDto'
        matchDayNumber:
          type: integer
        uniqueRowMatchId:
          type: string
      required:
      - id
      - playerLocalResultDto
      - playerVisitorResultDto
      - season
      - competitionInfo
      - matchDayNumber
      - uniqueRowMatchId
    FindMatchesRequestBodyDto:
      type: object
      properties:
        season:
          type: string
        competitionType:
          type: string
        competitionCategory:
          type: string
        competitionScope:
          type: string
        competitionScopeTag:
          type: string
        competitionGroup:
          type: string
        competitionGender:
          type: string
        matchDayNumber:
          type: integer
        practitionerName:
